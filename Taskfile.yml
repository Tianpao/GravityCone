version: '3'

vars:
  APP_NAME: "gravitycone"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "pnpm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  # Microsoft OAuth2 credentials — set these at build time to embed in the binary.
  # Example: task build MS_CLIENT_ID=xxx MS_CLIENT_SECRET=yyy
  # In GitHub Actions, use secrets: MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }} MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}
  MS_CLIENT_ID: ""
  MS_CLIENT_SECRET: ""
  # Naids OAuth2 credentials — same pattern as Microsoft above.
  NAIDS_CLIENT_ID: ""
  NAIDS_CLIENT_SECRET: ""

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:cli:
    summary: Builds the CLI version (no GUI, stdio JSON protocol)
    cmds:
      - go build -tags cli -trimpath -ldflags="-w -s{{if .MS_CLIENT_ID}} -X main.msClientID={{.MS_CLIENT_ID}}{{end}}{{if .MS_CLIENT_SECRET}} -X main.msClientSecret={{.MS_CLIENT_SECRET}}{{end}}{{if .NAIDS_CLIENT_ID}} -X main.naidsClientID={{.NAIDS_CLIENT_ID}}{{end}}{{if .NAIDS_CLIENT_SECRET}} -X main.naidsClientSecret={{.NAIDS_CLIENT_SECRET}}{{end}}" -o "{{.BIN_DIR}}/{{.APP_NAME}}-cli{{exeExt}}" .

  build:cli:dev:
    summary: Builds the CLI version in development mode
    cmds:
      - go build -tags cli -o "{{.BIN_DIR}}/{{.APP_NAME}}-cli{{exeExt}}" .

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
