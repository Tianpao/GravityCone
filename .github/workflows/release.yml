name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install build tools
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Windows GUI
        shell: bash
        run: |
          task build ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - name: Package
        shell: bash
        run: |
          cd bin
          zip "gravitycone-windows-${{ matrix.arch }}.zip" gravitycone.exe

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.arch }}
          path: bin/gravitycone-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-linux:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libglib2.0-dev libsoup-3.0-dev
          # Verify webkitgtk-6.0 was installed (requires universe repo)
          pkg-config --exists webkitgtk-6.0 || {
            echo "webkitgtk-6.0 not found; enabling universe repo..."
            sudo add-apt-repository -y universe
            sudo apt-get update
            sudo apt-get install -y libwebkitgtk-6.0-dev
          }

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Linux GUI
        run: |
          task build ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - name: Package
        run: |
          cd bin
          tar czf "gravitycone-linux-${{ matrix.arch }}.tar.gz" gravitycone

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: bin/gravitycone-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build & package macOS GUI
        run: |
          task darwin:package ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"
          cd bin
          zip -r "gravitycone-macos-${{ matrix.arch }}.zip" gravitycone.app

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: bin/gravitycone-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build universal macOS binary
        run: |
          task darwin:build:universal \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - name: Package .app bundle
        run: |
          task darwin:create:app:bundle
          cd bin
          zip -r "gravitycone-macos-universal.zip" gravitycone.app

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-universal
          path: bin/gravitycone-macos-universal.zip
          if-no-files-found: error

  build-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libglib2.0-dev libsoup-3.0-dev
          # Verify webkitgtk-6.0 was installed (requires universe repo)
          pkg-config --exists webkitgtk-6.0 || {
            echo "webkitgtk-6.0 not found; enabling universe repo..."
            sudo add-apt-repository -y universe
            sudo apt-get update
            sudo apt-get install -y libwebkitgtk-6.0-dev
          }

      - name: Build CLI
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          binary="gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -tags cli -trimpath -buildvcs=false \
            -ldflags="-w -s" \
            -o "bin/${binary}" .

          cd bin
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${binary}"
          else
            tar czf "gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${binary}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    needs:
      - build-windows
      - build-linux
      - build-macos
      - build-macos-universal
      - build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -mindepth 2 -type f -exec mv {} artifacts/ \;
          find artifacts -type d -empty -delete

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
