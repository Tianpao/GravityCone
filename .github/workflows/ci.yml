name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # GUI main imports Wails CGO on Linux. Vet the CLI build graph instead so
      # lint stays free of GTK/WebKit system deps; full GUI is covered by build-linux.
      - name: Go vet
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.gitkeep
          go vet -tags cli ./...

      - name: Gofmt check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "Files not formatted with gofmt:"
            echo "$fmt"
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps & type-check
        run: |
          pnpm install --dir frontend
          pnpm --dir frontend exec tsc --noEmit

  build-windows:
    needs: lint
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install build tools
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Windows GUI
        shell: bash
        run: |
          task build ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: gravitycone-windows-${{ matrix.arch }}
          path: bin/gravitycone.exe
          if-no-files-found: error

  build-linux:
    needs: lint
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Wails v3 Linux GUI needs GTK4 + WebKitGTK 6 (pkg-config: gtk4, webkitgtk-6.0).
      - name: Install system deps
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libgcc-s1
          echo "=== pkg-config modules ==="
          pkg-config --list-all | grep -E '^(gtk|webkit|glib|soup|gio)' || true
          for m in gtk4 webkitgtk-6.0 glib-2.0 gio-unix-2.0 libsoup-3.0; do
            if ! pkg-config --exists "$m"; then
              echo "ERROR: required pkg-config module missing: $m"
              pkg-config --print-errors --exists "$m" || true
              exit 1
            fi
            echo "$m: $(pkg-config --modversion "$m")"
          done

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Linux GUI
        env:
          CGO_ENABLED: "1"
        run: |
          task build ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: gravitycone-linux-${{ matrix.arch }}
          path: bin/gravitycone
          if-no-files-found: error

  build-macos:
    needs: lint
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install build tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.106
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build macOS GUI
        run: |
          task build ARCH=${{ matrix.arch }} \
            MS_CLIENT_ID="${{ secrets.MS_CLIENT_ID || '' }}" \
            MS_CLIENT_SECRET="${{ secrets.MS_CLIENT_SECRET || '' }}" \
            NAIDS_CLIENT_ID="${{ secrets.NAIDS_CLIENT_ID || '' }}" \
            NAIDS_CLIENT_SECRET="${{ secrets.NAIDS_CLIENT_SECRET || '' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: gravitycone-macos-${{ matrix.arch }}
          path: bin/gravitycone
          if-no-files-found: error

  # CLI is pure Go (build tag: cli), no Wails/CGO/GTK required.
  build-cli:
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          mkdir -p bin
          go build -tags cli -trimpath -buildvcs=false \
            -ldflags="-w -s" \
            -o "bin/gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" .

      - uses: actions/upload-artifact@v4
        with:
          name: gravitycone-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/gravitycone-cli-*
          if-no-files-found: error
